name: "PR-Sentry"
description: "Detect AI-generated pull requests using statistical NLP analysis. Zero-nitpick security review — Shannon entropy secret detection, slop scoring, and LLM review for open source maintainers."
author: "Ebuodinde"

branding:
  icon: "shield"
  color: "red"

inputs:
  provider:
    description: "LLM provider (anthropic, openai, deepseek). Auto-detects if not set."
    required: false
    default: ""
  api_key:
    description: "API key for the selected provider"
    required: false
  anthropic_api_key:
    description: "Anthropic API key (legacy, use api_key instead)"
    required: false
  openai_api_key:
    description: "OpenAI API key"
    required: false
  deepseek_api_key:
    description: "DeepSeek API key"
    required: false
  model:
    description: "Model override (e.g., gpt-4o, claude-sonnet-4-20250514)"
    required: false
  locale:
    description: "Report language (en, tr)"
    required: false
    default: "en"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt

    - name: Run PR-Sentry
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_SENTRY_PROVIDER: ${{ inputs.provider }}
        PR_SENTRY_API_KEY: ${{ inputs.api_key }}
        PR_SENTRY_MODEL: ${{ inputs.model }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        DEEPSEEK_API_KEY: ${{ inputs.deepseek_api_key }}
        PR_SENTRY_LOCALE: ${{ inputs.locale }}
      run: python ${{ github.action_path }}/main.py
